###############################################################################
# Shared extension blocks
###############################################################################
x-arr-env: &arr-env
  PUID: ${PUID:-99}
  PGID: ${PGID:-100}
  TZ:  ${TZ:-Europe/Warsaw}

# Common restart policy for auto-healing
x-restart-policy: &restart-policy
  restart: unless-stopped


###############################################################################
# Network
###############################################################################
networks:
  # External network for Traefik and web interfaces
  traefik_proxy:
    external: true

  # Internal network for arr services to communicate with each other
  arr_internal:
    driver: bridge
    internal: true

  # VPN network for torrent traffic
  vpn_network:
    driver: bridge

services:
  gluetun:
    image: qmcgaw/gluetun:v3.40.0
    container_name: gluetun
    <<: *restart-policy
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    env_file:
      - ./.env
    # No ports published to host — Traefik routes via Docker network.
    # qBittorrent WebUI and health server are only reachable through Traefik
    # or from other containers on the same network.
    environment:
      TZ:                         ${TZ}
      # --- ProtonVPN / WireGuard ---
      VPN_SERVICE_PROVIDER:       protonvpn
      VPN_TYPE:                   wireguard
      WIREGUARD_PRIVATE_KEY:      ${WG_PRIVATE_KEY}
      OPENVPN_USER:               ${PROTONVPN_USERNAME}
      OPENVPN_PASSWORD:           ${PROTONVPN_PASSWORD}
      WIREGUARD_ADDRESSES:        ${WG_ADDRESSES:-10.2.0.2/32}
      # Improved stability settings
      WIREGUARD_PERSISTENT_KEEPALIVE_INTERVAL: 25s # Increased for better stability
      SERVER_COUNTRIES:           Netherlands,Switzerland
      SERVER_FEATURES:            p2p
      # Port-forwarding
      VPN_PORT_FORWARDING:        on
      PORT_FORWARD_ONLY:          on
      FIREWALL_VPN_INPUT_PORTS:    "8080,9999"
      HEALTH_SERVER_ADDRESS: 0.0.0.0:9999
      # DNS Configuration for better resolution
      DNS: 1.1.1.1,8.8.8.8
      # Improved stability and reliability settings
      LOG_LEVEL:                  info
      VPN_PORT_FORWARDING_UP_COMMAND: /bin/sh -c 'wget -O- --retry-connrefused --wait=5 --tries=10 --post-data "json={\"listen_port\":{{PORTS}}}" http://127.0.0.1:8080/api/v2/app/setPreferences 2>&1'
      UPDATER_PERIOD:             24h
    volumes:
      - ${DATA_DIR}/gluetun:/gluetun
    networks:
      - traefik_proxy
      - vpn_network
      - arr_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      # qBittorrent
      traefik.http.routers.qbittorrent-secure.entrypoints:           websecure
      traefik.http.routers.qbittorrent-secure.rule:                  Host(`qbit.${DOMAIN_NAME}`)
      traefik.http.routers.qbittorrent-secure.tls:                   "true"
      traefik.http.routers.qbittorrent-secure.tls.certresolver:      letsencrypt
      traefik.http.routers.qbittorrent-secure.service:               qbittorrent-svc
      traefik.http.services.qbittorrent-svc.loadbalancer.server.port: "8080"
  qbittorrent:
    image: linuxserver/qbittorrent:5.1.4
    container_name: qbittorrent
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy  # Wait for gluetun to be healthy
    environment:
      PUID:             ${PUID:-99}
      PGID:             ${PGID:-100}
      TZ:               ${TZ:-Europe/Warsaw}
      WEBUI_PORT:       8080
      TORRENTING_PORT:  ${BT_PORT}
      BIND_TO_INTERFACE: tun0  # Bind qBittorrent to the VPN interface
    volumes:
      - ${DATA_DIR}/qbittorrent:/config
      - ${DOWNLOADS_DIR}:/downloads
      - ./qbittorrent-init/10-config.sh:/etc/cont-init.d/10-config.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://localhost:8080/api/v2/app/version && ping -c1 1.1.1.1"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.11.7
    container_name: jellyfin
    devices:
      - /dev/dri:/dev/dri
    environment:
      <<: *arr-env
      JELLYFIN_PublishedServerUrl: jellyfin.${DOMAIN_NAME}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8096/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ${DATA_DIR}/jellyfin:/config
      - ${MEDIA_MOVIES_DIR}:/data/movies
      - ${MEDIA_TV_DIR}:/data/tvshows
    restart: unless-stopped
    networks:
      - traefik_proxy
      - arr_internal
    ports:
      - "8096:8096"  # Jellyfin needs direct access for LAN clients (Infuse, Apple TV)
    labels:
      traefik.enable: "true"
      traefik.http.routers.jellyfin-secure.entrypoints: websecure
      traefik.http.routers.jellyfin-secure.rule: Host(`jellyfin.${DOMAIN_NAME}`)
      traefik.http.routers.jellyfin-secure.tls: "true"
      traefik.http.routers.jellyfin-secure.tls.certresolver: letsencrypt
      traefik.http.routers.jellyfin-secure.service: jellyfin-svc
      traefik.http.services.jellyfin-svc.loadbalancer.server.port: "8096"
      traefik.http.middlewares.jellyfin-headers.headers.customResponseHeaders.X-Frame-Options: "SAMEORIGIN"
      traefik.http.routers.jellyfin-secure.middlewares: jellyfin-headers
  sonarr:
    image: linuxserver/sonarr:4.0.17
    container_name: sonarr
    depends_on:
      gluetun:
        condition: service_healthy
    environment: *arr-env
    networks:
      - traefik_proxy
      - arr_internal
    volumes:
      - ${DATA_DIR}/sonarr:/config
      - ${MEDIA_TV_DIR}:/tv
      - ${DOWNLOADS_DIR}:/downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.sonarr-secure.entrypoints: websecure
      traefik.http.routers.sonarr-secure.rule: Host(`sonarr.${DOMAIN_NAME}`)
      traefik.http.routers.sonarr-secure.tls: "true"
      traefik.http.routers.sonarr-secure.tls.certresolver: letsencrypt
      traefik.http.routers.sonarr-secure.service: sonarr-svc
      traefik.http.services.sonarr-svc.loadbalancer.server.port: "8989"
  radarr:
    image: linuxserver/radarr:6.1.1
    container_name: radarr
    depends_on:
      gluetun:
        condition: service_healthy
    environment: *arr-env
    networks:
      - traefik_proxy
      - arr_internal
    volumes:
      - ${DATA_DIR}/radarr:/config
      - ${MEDIA_MOVIES_DIR}:/movies
      - ${DOWNLOADS_DIR}:/downloads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7878/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.radarr-secure.entrypoints:                websecure
      traefik.http.routers.radarr-secure.rule:                       Host(`radarr.${DOMAIN_NAME}`)
      traefik.http.routers.radarr-secure.tls:                        "true"
      traefik.http.routers.radarr-secure.tls.certresolver:           letsencrypt
      traefik.http.routers.radarr-secure.service:                    radarr-svc
      traefik.http.services.radarr-svc.loadbalancer.server.port:     "7878"
  prowlarr:
    image: linuxserver/prowlarr:2.3.5
    container_name: prowlarr
    depends_on:
      gluetun:
        condition: service_healthy
    environment: *arr-env
    networks:
      - traefik_proxy
      - arr_internal
    volumes:
      - ${DATA_DIR}/prowlarr:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.prowlarr-secure.entrypoints:              websecure
      traefik.http.routers.prowlarr-secure.rule:                     Host(`prowlarr.${DOMAIN_NAME}`)
      traefik.http.routers.prowlarr-secure.tls:                      "true"
      traefik.http.routers.prowlarr-secure.tls.certresolver:         letsencrypt
      traefik.http.routers.prowlarr-secure.service:                  prowlarr-svc
      traefik.http.services.prowlarr-svc.loadbalancer.server.port:   "9696"
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.1.0
    container_name: seerr
    depends_on:
      gluetun:
        condition: service_healthy
    networks:
      - traefik_proxy
      - arr_internal
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ:   ${TZ:-Europe/Warsaw}
    volumes:
      - ${DATA_DIR}/seerr/config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5055/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.seerr-secure.entrypoints:             websecure
      traefik.http.routers.seerr-secure.rule:                    Host(`seerr.${DOMAIN_NAME}`)
      traefik.http.routers.seerr-secure.tls:                     "true"
      traefik.http.routers.seerr-secure.tls.certresolver:        letsencrypt
      traefik.http.routers.seerr-secure.service:                 seerr-svc
      traefik.http.services.seerr-svc.loadbalancer.server.port:  "5055"
  bazarr:
    image: lscr.io/linuxserver/bazarr:1.5.6
    container_name: bazarr
    depends_on:
      gluetun:
        condition: service_healthy
    environment: *arr-env
    networks:
      - traefik_proxy
      - arr_internal
    volumes:
      - ${DATA_DIR}/bazarr:/config
      - ${MEDIA_MOVIES_DIR}:/movies
      - ${MEDIA_TV_DIR}:/tv
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.bazarr-secure.entrypoints:                websecure
      traefik.http.routers.bazarr-secure.rule:                       Host(`bazarr.${DOMAIN_NAME}`)
      traefik.http.routers.bazarr-secure.tls:                        "true"
      traefik.http.routers.bazarr-secure.tls.certresolver:           letsencrypt
      traefik.http.routers.bazarr-secure.service:                    bazarr-svc
      traefik.http.services.bazarr-svc.loadbalancer.server.port:     "6767"

  # Auto-healing container for the entire stack
  auto-heal:
    image: willfarrell/autoheal:1.2.0
    container_name: auto-heal
    <<: *restart-policy
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 60
      AUTOHEAL_START_PERIOD: 300
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - arr_internal
      - traefik_proxy
      - vpn_network

