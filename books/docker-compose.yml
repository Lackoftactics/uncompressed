###############################################################################
# Books Stack - Kavita Reading Server
###############################################################################

# Common environment variables for consistent user/group/timezone settings
x-books-env: &books-env
  PUID: ${PUID:-99}
  PGID: ${PGID:-100}
  TZ: ${TZ:-Europe/Warsaw}

# Common restart policy
x-restart-policy: &restart-policy
  restart: unless-stopped

###############################################################################
# Networks
###############################################################################
networks:
  # External network for Traefik integration
  traefik_proxy:
    external: true

services:
  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    <<: *restart-policy
    environment: *books-env
    ports:
      - "5000:5000"
    networks:
      - traefik_proxy
    volumes:
      - /mnt/user/appdata/kavita:/config
      - /mnt/user/media/books:/books
      - /mnt/user/media/comics:/comics:ro  # Optional: if you have comics
      - /mnt/user/media/manga:/manga:ro    # Optional: if you have manga
      - /mnt/user/media/downloads/qbittorrent:/downloads:ro  # Access to downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.kavita-secure.entrypoints: websecure
      traefik.http.routers.kavita-secure.rule: Host(`kavita.${DOMAIN_NAME}`)
      traefik.http.routers.kavita-secure.tls: "true"
      traefik.http.routers.kavita-secure.tls.certresolver: letsencrypt
      traefik.http.routers.kavita-secure.service: kavita-svc
      traefik.http.services.kavita-svc.loadbalancer.server.port: "5000"
      # Optional: Add security headers for reading content
      traefik.http.middlewares.kavita-headers.headers.customResponseHeaders.X-Frame-Options: "SAMEORIGIN"
      traefik.http.middlewares.kavita-headers.headers.customResponseHeaders.X-Content-Type-Options: "nosniff"
      traefik.http.routers.kavita-secure.middlewares: kavita-headers

